<style>
:root{
  --limewash:#F1ECE0; --cream:#FBF8F1; --sage:#7C8770; --sage-deep:#5C6651;
  --clay:#C08A6E; --ink:#3A3631; --line:rgba(58,54,49,.12);
  --serif:'Fraunces',serif; --sans:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-weight:400}
body{max-width:760px;margin:0 auto;padding-bottom:76px;min-height:100vh}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

header{position:sticky;top:0;z-index:20;background:var(--sage);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:300;font-size:23px;color:var(--cream);letter-spacing:.5px}
.logo i{font-style:italic;color:var(--clay)}
.hdr-right{display:flex;align-items:center;gap:12px}
header .ic{color:var(--cream);background:none;border:none;cursor:pointer;position:relative;display:flex;align-items:center}
.i{width:22px;height:22px;flex-shrink:0}
.badge{position:absolute;top:-6px;right:-8px;background:var(--clay);color:var(--cream);
  font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;padding:0 4px;font-weight:500}

.lang-sw{display:flex;gap:2px;background:rgba(255,255,255,.15);border-radius:8px;padding:2px}
.lang-btn{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.3px;
  padding:4px 7px;border:none;border-radius:6px;cursor:pointer;
  background:transparent;color:rgba(251,248,241,.7);transition:.15s}
.lang-btn.on{background:var(--cream);color:var(--sage-deep)}

.tagline{text-align:center;padding:18px 24px 6px}
.tagline p{font-family:var(--serif);font-weight:300;font-size:18px;line-height:1.45;color:var(--ink)}
.tagline span{color:var(--sage)}

.search-wrap{padding:10px 16px 0;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:12px;
  font-family:var(--sans);font-size:14px;background:var(--cream);color:var(--ink);outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--sage);box-shadow:0 0 0 2px rgba(124,135,112,.15)}
.search-wrap input::placeholder{color:rgba(58,54,49,.35)}
.search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);width:18px;height:18px;
  color:rgba(58,54,49,.35);pointer-events:none}

.toolbar{display:flex;gap:8px;padding:14px 16px 6px;overflow-x:auto;scrollbar-width:none;align-items:center}
.toolbar::-webkit-scrollbar{display:none}
.chip{font-size:13px;letter-spacing:.3px;padding:7px 15px;border-radius:16px;white-space:nowrap;
  cursor:pointer;border:none;background:var(--cream);color:var(--ink);transition:.15s;flex-shrink:0}
.chip.on{background:var(--sage);color:var(--cream)}
.sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 2px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:12px 16px 24px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr 1fr}}
.card{background:#FFFFFF;border-radius:14px;overflow:hidden;border:.5px solid var(--line);
  display:flex;flex-direction:column;transition:opacity .2s}
.card.oos{opacity:.45}
.ph{aspect-ratio:4/5;background:#E8E2D4;position:relative;overflow:hidden}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.ph .ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--sage)}
.ph .ico .i{width:46px;height:46px}
.fav{position:absolute;top:8px;right:8px;background:rgba(251,248,241,.85);border:none;
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--clay)}
.fav .i{width:17px;height:17px}
.fav.on{background:var(--clay);color:var(--cream)}
.tier{position:absolute;top:8px;left:8px;background:var(--clay);color:var(--cream);
  font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.body{padding:11px 12px 12px;display:flex;flex-direction:column;flex:1}
.nm{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:3px}
.sub{font-size:11.5px;color:var(--sage);line-height:1.35;margin-bottom:9px;flex:1}
.pr{font-family:var(--serif);font-size:16px;margin-bottom:10px}
.btns{display:flex;gap:6px}
.btns button{flex:1;padding:8px 0;font-family:var(--sans);font-size:12px;letter-spacing:.3px;
  border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.wa{background:var(--sage);color:var(--cream);border:none}
.btns button .i,.favbar-btn .i{width:16px;height:16px}
.wa:active{background:var(--sage-deep)}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:760px;
  background:var(--limewash);border-top:.5px solid var(--line);display:flex;justify-content:space-around;
  padding:9px 0 calc(9px + env(safe-area-inset-bottom));z-index:20}
nav a{flex:1;text-align:center;font-size:10px;letter-spacing:.4px;color:var(--ink);
  text-decoration:none;opacity:.55;cursor:pointer}
nav a.on{opacity:1;color:var(--sage)}
nav a .i{width:22px;height:22px;display:block;margin:0 auto 2px}
.empty{text-align:center;padding:48px 24px;color:var(--sage);font-size:14px;grid-column:1/-1}

.favbar{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);
  max-width:736px;background:var(--sage);border-radius:14px;padding:12px 14px;z-index:21;
  display:none;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 4px 18px rgba(58,54,49,.18)}
.favbar.show{display:flex}
.favbar-info{display:flex;flex-direction:column;color:var(--cream);line-height:1.25}
.favbar-info span:first-child{font-size:12px;opacity:.85;letter-spacing:.3px}
.favbar-info span:last-child{font-family:var(--serif);font-size:18px}
.favbar-btn{background:var(--cream);color:var(--sage-deep);border:none;border-radius:10px;
  padding:11px 16px;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.3px;
  cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.favbar-btn:active{background:#fff}
</style>

const tg = (n)=>new Intl.NumberFormat('ru-RU').format(Math.round(n))+" ₸";

const ICON = {
  book:'<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h10a2 2 0 0 1 2 2v13a1 1 0 0 0-1-1H5z"/><path d="M5 18a1 1 0 0 0-1 1V6a2 2 0 0 1 2-2"/></svg>',
  heart:'<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19.5 12.6 12 20l-7.5-7.4A5 5 0 1 1 12 6a5 5 0 1 1 7.5 6.6z"/></svg>',
  heartFill:'<svg class="i" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round" aria-hidden="true"><path d="M19.5 12.6 12 20l-7.5-7.4A5 5 0 1 1 12 6a5 5 0 1 1 7.5 6.6z"/></svg>',
  wa:'<svg class="i" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2zm5.6 14c-.2.6-1.2 1.2-1.7 1.2-.5.1-1 .1-1.7-.1-.4-.1-1-.3-1.6-.6-2.9-1.2-4.7-4-4.9-4.2-.1-.2-1.1-1.5-1.1-2.8s.7-2 .9-2.3c.2-.2.5-.3.6-.3h.5c.2 0 .4 0 .6.5l.7 1.8c.1.1.1.3 0 .5l-.3.5-.3.3c-.1.1-.2.3-.1.5.1.2.6 1 1.4 1.7 1 .9 1.8 1.1 2 1.2.2.1.4.1.5-.1l.6-.7c.2-.2.3-.2.5-.1l1.7.8c.2.1.4.2.4.3.1.1.1.5-.1 1z"/></svg>'
};

let lang = localStorage.getItem('bs_lang') || 'ru';
let view = "all", filter = "all", sort = "default", query = "";
let favs = JSON.parse(localStorage.getItem('bs_favs')||'[]');

function t(key){ return I18N[lang][key]; }
function sub(p){ return p.sub[lang] || p.sub.ru; }

function waLink(p){
  const msg = p ? t('waOne')(p) : t('waGeneral');
  return `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;
}

function waFavLink(){
  const chosen = PRODUCTS.filter(p=>favs.includes(p.id));
  if(!chosen.length) return waLink();
  const lines = chosen.map(p=>`• ${p.name} — ${tg(p.price)}`).join('\n');
  const total = chosen.reduce((s,p)=>s+p.price,0);
  return `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(t('waBulk')(lines,total))}`;
}

function applyLang(){
  document.documentElement.lang = t('htmlLang');
  document.title = t('title');
  document.querySelector('meta[name="description"]').content = t('desc');
  document.getElementById('sr-title').textContent = t('srTitle');
  document.getElementById('tagline').innerHTML = t('tagline');
  document.getElementById('searchInput').placeholder = t('search');
  document.getElementById('favbar-btn-text').textContent = t('writeSelected');
  document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=t(el.dataset.t)});
  document.querySelectorAll('#langSw .lang-btn').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===lang);
  });
}

function renderToolbar(){
  const cats = CATEGORIES.map(c=>
    `<button class="chip ${filter===c.key?'on':''}" data-f="${c.key}">${c.label[lang]||c.label.ru}</button>`).join('');
  const sorts = `<div class="sep"></div>`+
    `<button class="chip ${sort==='default'?'on':''}" data-s="default">${t('sortDefault')}</button>`+
    `<button class="chip ${sort==='asc'?'on':''}" data-s="asc">${t('sortAsc')}</button>`+
    `<button class="chip ${sort==='desc'?'on':''}" data-s="desc">${t('sortDesc')}</button>`;
  document.getElementById('toolbar').innerHTML = cats + sorts;
}

function visible(){
  let list = PRODUCTS;
  if(view==="fav") list = list.filter(p=>favs.includes(p.id));
  if(filter!=="all" && view!=="fav") list = list.filter(p=>p.cats.includes(filter));
  if(query){
    const q = query.toLowerCase();
    list = list.filter(p=>p.name.toLowerCase().includes(q) || sub(p).toLowerCase().includes(q));
  }
  if(sort==="asc") list = [...list].sort((a,b)=>a.price-b.price);
  else if(sort==="desc") list = [...list].sort((a,b)=>b.price-a.price);
  else {
    list = [...list].sort((a,b)=>{
      const rank = p=> p.stock ? (p.img ? 0 : 1) : 2;
      return rank(a) - rank(b);
    });
  }
  return list;
}

function card(p){
  const isFav = favs.includes(p.id);
  const tierLabel = p.tier==="target" ? t('choice') : "";
  const photo = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy">`
    : `<div class="ico">${ICON.book}</div>`;
  return `<div class="card${p.stock?'':' oos'}">
    <div class="ph">
      ${photo}
      ${tierLabel?`<span class="tier">${tierLabel}</span>`:""}
      ${p.stock?"":`<span class="tier" style="background:var(--ink)">${t('toOrder')}</span>`}
      <button class="fav ${isFav?'on':''}" data-fav="${p.id}" aria-label="${t('toFav')}">
        ${isFav?ICON.heartFill:ICON.heart}</button>
    </div>
    <div class="body">
      <p class="nm">${p.name}</p>
      <p class="sub">${sub(p)}</p>
      <p class="pr">${tg(p.price)}</p>
      <div class="btns">
        <button class="wa" onclick="openLink('${waLink(p)}')">
          ${ICON.wa}${t('write')}</button>
      </div>
    </div></div>`;
}

function render(){
  const list = visible();
  const g = document.getElementById('grid');
  g.innerHTML = list.length
    ? list.map(card).join('')
    : `<div class="empty">${view==="fav"?t('emptyFav'):t('emptySearch')}</div>`;
  const fc = document.getElementById('favCount');
  if(favs.length){fc.style.display='flex';fc.textContent=favs.length;} else fc.style.display='none';
  document.getElementById('toolbar').style.display = view==="fav" ? 'none' : 'flex';
  document.querySelector('.search-wrap').style.display = view==="fav" ? 'none' : 'block';

  const bar = document.getElementById('favbar');
  const chosen = PRODUCTS.filter(p=>favs.includes(p.id));
  if(view==="fav" && chosen.length){
    const total = chosen.reduce((s,p)=>s+p.price,0);
    document.getElementById('favbar-count').textContent = t('bookCount')(chosen.length);
    document.getElementById('favbar-total').textContent = tg(total);
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

function openLink(url){ window.open(url,'_blank','noopener'); }

document.getElementById('toolbar').addEventListener('click',e=>{
  const fb=e.target.closest('[data-f]');
  if(fb){ filter=fb.dataset.f; renderToolbar(); render(); return; }
  const sb=e.target.closest('[data-s]');
  if(sb){ sort=sb.dataset.s; renderToolbar(); render(); }
});
document.getElementById('grid').addEventListener('click',e=>{
  const b=e.target.closest('[data-fav]'); if(!b)return;
  const id=b.dataset.fav;
  favs = favs.includes(id) ? favs.filter(x=>x!==id) : [...favs,id];
  localStorage.setItem('bs_favs',JSON.stringify(favs));
  render();
});
document.querySelectorAll('nav a[data-view]').forEach(a=>{
  a.addEventListener('click',()=>{
    view=a.dataset.view;
    document.querySelectorAll('nav a').forEach(x=>x.classList.remove('on'));
    a.classList.add('on');
    render();
  });
});
document.getElementById('navWa').addEventListener('click',()=>openLink(waLink()));
document.getElementById('favBtn').addEventListener('click',()=>{
  document.querySelector('nav a[data-view="fav"]').click();
});
document.getElementById('favbar-btn').addEventListener('click',()=>openLink(waFavLink()));
document.getElementById('searchInput').addEventListener('input',e=>{
  query = e.target.value.trim();
  render();
});
document.getElementById('langSw').addEventListener('click',e=>{
  const b = e.target.closest('[data-lang]'); if(!b) return;
  lang = b.dataset.lang;
  localStorage.setItem('bs_lang', lang);
  applyLang(); renderToolbar(); render();
});

applyLang(); renderToolbar(); render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
